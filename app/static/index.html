<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOSPI200 시가총액 트리맵</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root{ --bg:#1b1f2a; --fg:#e6e6e6; --muted:#8a90a0; --panel:#2b313f; --border:#3a3f4b; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
  #top{ text-align:center; padding:14px 0 6px; }
  #title{ font-size:22px; font-weight:700; }
  #asof{ color:var(--muted); font-size:14px; font-weight:400; margin-left:6px; }
  #tabs{ display:flex; gap:6px; justify-content:center; margin:10px 0 4px; flex-wrap:wrap; }
  .tab{ background:var(--panel); color:var(--fg); border:1px solid var(--border);
    border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .tab.active{ background:#e9edf5; color:#1b1f2a; font-weight:700; }
  #chart{ width:100%; height:calc(100vh - 130px); }
  #foot{ text-align:center; color:var(--muted); font-size:11px; padding:4px 0 8px; }
  #status{ color:var(--muted); font-size:12px; margin-left:8px; }

  /* V3 로그인/구독 */
  #authbar{ position:fixed; top:12px; right:16px; z-index:40; display:flex;
    align-items:center; gap:10px; font-size:13px; }
  .btn{ cursor:pointer; border:1px solid var(--border); border-radius:8px;
    padding:6px 12px; color:var(--fg); background:#2b313f; text-decoration:none; }
  .btn-kakao{ background:#FEE500; color:#191600; border-color:#FEE500; font-weight:700; }
  .badge-sub{ background:#0a9d4a; color:#fff; border-radius:6px; padding:3px 8px; font-weight:700; }
  /* 광고 배너(비구독자에게만) */
  #adbar{ display:none; position:fixed; left:0; right:0; bottom:0; z-index:45;
    background:#10141d; border-top:1px solid var(--border); color:var(--muted);
    text-align:center; padding:10px 12px; font-size:13px; }
  #adbar.show{ display:block; }
  #adClose{ margin-left:12px; cursor:pointer; color:var(--fg); }

  /* V2 뉴스 화면 — 종목 클릭 시 전체 화면을 채우는 회색 패널 */
  #newsPanel{ position:fixed; inset:0; width:100%; height:100%;
    background:#2b313f;                 /* 배경색(슬레이트) 위에 뜨는 회색 패널 */
    transform:translateY(100%); transition:transform .3s ease;
    z-index:50; display:flex; flex-direction:column; }
  #newsPanel.open{ transform:translateY(0); }
  #newsHead{ display:flex; justify-content:space-between; align-items:center;
    padding:18px 28px; border-bottom:1px solid var(--border); background:#333b4c; }
  #newsHeadL{ display:flex; align-items:baseline; gap:12px; }
  #newsTitle{ font-size:24px; font-weight:800; }
  #newsSub{ color:var(--muted); font-size:13px; }
  #newsClose{ cursor:pointer; color:var(--fg); font-size:15px; padding:6px 14px;
    border:1px solid var(--border); border-radius:8px; background:#252b38; }
  #newsClose:hover{ background:#1f2530; }
  #newsBody{ flex:1; overflow-y:auto; padding:18px 0 40px; }
  #newsInner{ max-width:820px; margin:0 auto; padding:0 24px; }
  .news-item{ display:block; padding:16px 12px; border-bottom:1px solid #3a4253;
    text-decoration:none; color:var(--fg); border-radius:8px; }
  .news-item:hover{ background:#333b4c; }
  .news-headline{ font-size:17px; line-height:1.45; }
  .news-meta{ color:var(--muted); font-size:13px; margin-top:6px; }
  .news-empty{ color:var(--muted); font-size:15px; padding:60px 12px; text-align:center; }
  .sent{ display:inline-block; font-size:12px; font-weight:700; padding:2px 9px;
    border-radius:6px; margin-right:8px; vertical-align:middle; }
  .sent-pos{ background:#0a9d4a; color:#fff; }
  .sent-neg{ background:#c40000; color:#fff; }
  .sent-neu{ background:#3a4253; color:#cfd4de; }
</style>
</head>
<body>
  <div id="authbar"></div>

  <div id="top">
    <span id="title">KOSPI200 시가총액 트리맵</span><span id="asof"></span>
    <span id="status"></span>
    <div id="tabs"></div>
  </div>
  <div id="chart"></div>
  <div id="foot">박스 크기 = 시가총액 · 색상 = 등락률 · 업종 클릭 = 확대 · 종목 클릭 = 뉴스 · 상단 'KOSPI200' 클릭 = 뒤로</div>

  <div id="adbar">
    📢 광고 영역 — <b>구독하면 광고가 사라져요.</b>
    <span id="adClose" onclick="document.getElementById('adbar').classList.remove('show')">✕</span>
  </div>

  <div id="newsPanel">
    <div id="newsHead">
      <div id="newsHeadL">
        <span id="newsTitle"></span>
        <span id="newsSub">최근 24시간 · 최신순 최대 10건 · 호재/악재는 자동 추정(참고용)</span>
      </div>
      <span id="newsClose" onclick="closeNews()">← 뒤로</span>
    </div>
    <div id="newsBody"></div>
  </div>

<script>
const PERIODS = ["실시간","1일","1주","1개월","3개월","1년","YTD"];
let current = "실시간";
let timer = null;
const REFRESH_MS = 15000; // 장중 자동 갱신 주기

function renderTabs(){
  const box = document.getElementById("tabs");
  box.innerHTML = "";
  PERIODS.forEach(p=>{
    const b = document.createElement("div");
    b.className = "tab" + (p===current?" active":"");
    b.textContent = p;
    b.onclick = ()=>{ current=p; renderTabs(); load(); };
    box.appendChild(b);
  });
}

let lastData = null;
function draw(d){
  lastData = d;
  const data = [{
    type:"treemap", branchvalues:"total",
    ids:d.ids, labels:d.labels, parents:d.parents, values:d.values,
    text:d.text, texttemplate:"%{text}", customdata:d.customdata,
    hovertemplate:"<b>%{label}</b><br>시총: %{customdata[0]}<br>수익률: %{customdata[1]}<extra></extra>",
    marker:{ colors:d.colors, colorscale:d.colorscale, cmid:0, cmin:d.cmin, cmax:d.cmax,
             line:{width:1,color:"#1b1f2a"},
             colorbar:{ title:"등락률 %", ticksuffix:"%", tickfont:{color:"#e6e6e6"}, title_font:{color:"#e6e6e6"}, outlinewidth:0 } },
    textfont:{ size:13, color:"#e6e6e6", family:"Pretendard,'Apple SD Gothic Neo',sans-serif" },
    tiling:{ packing:"squarify" }, sort:true,
    pathbar:{ visible:true, thickness:24, side:"top" },
  }];
  const layout = {
    paper_bgcolor:"#1b1f2a", plot_bgcolor:"#1b1f2a",
    margin:{l:8,r:8,t:8,b:8},
    font:{ color:"#e6e6e6", family:"Pretendard,'Apple SD Gothic Neo',sans-serif" },
  };
  Plotly.react("chart", data, layout, {responsive:true, displayModeBar:false})
    .then(()=>{ togglePathbar(); bindClick(); });
}

let _bound = false;
function bindClick(){
  if(_bound) return;
  const gd = document.getElementById("chart");
  gd.on("plotly_treemapclick", function(ev){
    const p = ev.points && ev.points[0];
    if(!p) return;
    // Plotly 버전에 따라 p.id 가 없을 수 있어 pointNumber 로 ids 를 역참조
    let id = p.id;
    if(!id && lastData && typeof p.pointNumber === "number") id = lastData.ids[p.pointNumber];
    if(id && id.indexOf("stk::") === 0){      // 종목(리프) 클릭 → 뉴스
      const ticker = id.slice(5);
      const label = p.label || (lastData ? lastData.labels[p.pointNumber] : ticker);
      openNews(ticker, label);
      return false;                            // 기본 동작(확대) 막기
    }
    // 업종 클릭은 기본 확대 동작 유지
  });
  _bound = true;
}

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function fmtTime(iso){ try{ return new Date(iso).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return iso; } }

async function openNews(ticker, name){
  const panel = document.getElementById("newsPanel");
  panel.classList.add("open");
  document.getElementById("newsTitle").textContent = name || ticker;
  setBody('<div class="news-empty">불러오는 중…</div>');
  try{
    const r = await fetch(`/api/news?ticker=${encodeURIComponent(ticker)}`);
    renderNews(await r.json());
  }catch(e){
    setBody('<div class="news-empty">불러오기 실패</div>');
  }
}

function setBody(inner){
  document.getElementById("newsBody").innerHTML = '<div id="newsInner">' + inner + '</div>';
}

function renderNews(d){
  if(d.error === "no_api_key"){
    setBody('<div class="news-empty">네이버 API 키가 설정되지 않았어요.<br>.env 에 NAVER_CLIENT_ID/SECRET 추가하세요.</div>');
    return;
  }
  const items = d.items || [];
  if(!items.length){
    setBody('<div class="news-empty">최근 24시간 내 뉴스가 없어요.</div>');
    return;
  }
  setBody(items.map(it=>`
    <a class="news-item" href="${it.link}" target="_blank" rel="noopener">
      <div class="news-headline">${sentBadge(it.label)}${escapeHtml(it.title)}</div>
      <div class="news-meta">${escapeHtml(it.source||"")} · ${fmtTime(it.pub)}</div>
    </a>`).join(""));
}

function sentBadge(label){
  if(!label) return "";
  const cls = label==="호재" ? "sent-pos" : (label==="악재" ? "sent-neg" : "sent-neu");
  return `<span class="sent ${cls}">${label}</span>`;
}

function closeNews(){ document.getElementById("newsPanel").classList.remove("open"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeNews(); });

function togglePathbar(){
  document.querySelectorAll("#chart g.pathbar").forEach(pb=>{
    const n = pb.querySelectorAll("g.slice").length;
    pb.style.display = (n<=1) ? "none" : "";
  });
}

async function load(){
  try{
    const r = await fetch(`/api/heatmap?period=${encodeURIComponent(current)}`);
    const d = await r.json();
    document.getElementById("asof").textContent = "· 기준 " + (d.as_of||"");
    const st = document.getElementById("status");
    if(current==="실시간"){
      st.textContent = d.market_open ? "● 실시간(장중, 자동 갱신)" : "○ 장 마감 — 1일과 동일";
      st.style.color = d.market_open ? "#23c265" : "#8a90a0";
    } else { st.textContent = ""; }
    draw(d);
    scheduleRefresh(d.market_open);
  }catch(e){
    document.getElementById("status").textContent = "데이터 로드 실패";
  }
}

function scheduleRefresh(marketOpen){
  if(timer) clearTimeout(timer);
  if(current==="실시간" && marketOpen){
    timer = setTimeout(load, REFRESH_MS);
  }
}

// ── V3: 로그인/구독 상태 + 광고 게이팅 ──
async function loadMe(){
  let d = {logged_in:false, kakao_enabled:false};
  try{ d = await (await fetch("/api/me", {cache:"no-store"})).json(); }catch(e){}
  const bar = document.getElementById("authbar");
  if(d.logged_in){
    const sub = d.is_subscribed ? '<span class="badge-sub">구독중</span>' : '';
    bar.innerHTML = `${sub}<span>${escapeHtml(d.nickname||"")}</span>`
      + `<a class="btn" href="/auth/logout">로그아웃</a>`;
  } else {
    bar.innerHTML = d.kakao_enabled
      ? `<a class="btn btn-kakao" href="/auth/login">카카오 로그인</a>`
      : `<span style="color:var(--muted)">로그인 비활성</span>`;
  }
  // 광고: 구독자에겐 숨김, 그 외(비로그인/무료)엔 표시
  document.getElementById("adbar").classList.toggle("show", !(d.logged_in && d.is_subscribed));
}

renderTabs();
load();
loadMe();
window.addEventListener("resize", togglePathbar);
</script>
</body>
</html>

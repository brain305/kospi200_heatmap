<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOSPI200 시가총액 트리맵</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root{ --bg:#1b1f2a; --fg:#e6e6e6; --muted:#8a90a0; --panel:#2b313f; --border:#3a3f4b; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
  #top{ text-align:center; padding:14px 0 6px; }
  #title{ font-size:22px; font-weight:700; }
  #asof{ color:var(--muted); font-size:14px; font-weight:400; margin-left:6px; }
  #tabs{ display:flex; gap:6px; justify-content:center; margin:10px 0 4px; flex-wrap:wrap; }
  .tab{ background:var(--panel); color:var(--fg); border:1px solid var(--border);
    border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .tab.active{ background:#e9edf5; color:#1b1f2a; font-weight:700; }
  #chart{ width:100%; height:calc(100vh - 130px); }
  #treeBack{ display:none; position:fixed; left:8px; top:90px; z-index:46;
    width:30px; height:30px; border-radius:7px; padding:0;
    background:rgba(43,49,63,.92); border:1px solid var(--border);
    color:#fff; font-size:16px; font-weight:800; line-height:28px; text-align:center;
    cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.35); }
  #treeBack:hover{ background:#3a4253; }
  #treeBack:active{ transform:translateY(1px); }
  #treeBack.show{ display:block; }
  @media (max-width:600px){ #treeBack{ top:auto; bottom:14px; left:10px;
    width:40px; height:40px; line-height:38px; font-size:20px; } }
  body.ad-on #chart{ height:calc(100vh - 130px - 150px); }  /* 광고 높이만큼 차트 축소 */
  #foot{ text-align:center; color:var(--muted); font-size:11px; padding:4px 0 8px; }
  #status{ color:var(--muted); font-size:12px; margin-left:8px; }

  /* V3 로그인/구독 */
  #authbar{ position:fixed; top:12px; right:16px; z-index:40; display:flex;
    align-items:center; gap:10px; font-size:13px; }
  .btn{ cursor:pointer; border:1px solid var(--border); border-radius:8px;
    padding:6px 12px; color:var(--fg); background:#2b313f; text-decoration:none; }
  .btn-kakao{ background:#FEE500; color:#191600; border-color:#FEE500; font-weight:700; }
  .btn-sub{ background:#3a78ff; color:#fff; border-color:#3a78ff; font-weight:700; }
  .badge-sub{ background:#0a9d4a; color:#fff; border-radius:6px; padding:3px 8px; font-weight:700; }
  /* 내 구독 모달 */
  #acctModal{ display:none; position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.55);
    align-items:center; justify-content:center; }
  #acctModal.show{ display:flex; }
  .acct-card{ background:#222836; border:1px solid var(--border); border-radius:14px;
    width:360px; max-width:90vw; padding:22px; }
  .acct-title{ font-size:18px; font-weight:800; margin-bottom:14px; }
  .acct-row{ display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; border-bottom:1px solid #2f3645; font-size:14px; }
  .acct-row .k{ color:var(--muted); }
  .acct-actions{ margin-top:16px; display:flex; gap:8px; }
  .acct-note{ color:var(--muted); font-size:12px; margin-top:12px; line-height:1.5; }
  /* 광고 배너(비구독자에게만) */
  #adbar{ display:none; position:fixed; left:0; right:0; bottom:0; z-index:45;
    background:#10141d; border-top:1px solid var(--border); color:var(--muted);
    text-align:center; padding:2px 8px 0; font-size:13px; line-height:0; }
  #adbar.show{ display:block; }
  #adbar .ad-slot{ line-height:0; }
  #adbar iframe{ max-width:100%; border:0; display:block; margin:0 auto; vertical-align:bottom; }
  .ad-disc{ color:#6b7180; font-size:10px; line-height:1.2; margin:1px 0 2px; }

  /* V2 뉴스 화면 — 종목 클릭 시 전체 화면을 채우는 회색 패널 */
  #newsPanel{ position:fixed; inset:0; width:100%; height:100%;
    background:#2b313f;                 /* 배경색(슬레이트) 위에 뜨는 회색 패널 */
    transform:translateY(100%); transition:transform .3s ease;
    z-index:50; display:flex; flex-direction:column; }
  #newsPanel.open{ transform:translateY(0); }
  #newsHead{ display:flex; justify-content:space-between; align-items:center;
    padding:18px 28px; border-bottom:1px solid var(--border); background:#333b4c; }
  #newsHeadL{ display:flex; align-items:baseline; gap:12px; }
  #newsTitle{ font-size:24px; font-weight:800; }
  #newsSub{ color:var(--muted); font-size:13px; }
  #newsClose{ cursor:pointer; color:var(--fg); font-size:15px; padding:6px 14px;
    border:1px solid var(--border); border-radius:8px; background:#252b38; }
  #newsClose:hover{ background:#1f2530; }
  #newsBody{ flex:1; overflow-y:auto; padding:18px 0 40px; }
  #newsInner{ max-width:820px; margin:0 auto; padding:0 24px; }
  .news-item{ display:block; padding:16px 12px; border-bottom:1px solid #3a4253;
    text-decoration:none; color:var(--fg); border-radius:8px; }
  .news-item:hover{ background:#333b4c; }
  .news-headline{ font-size:17px; line-height:1.45; }
  .news-meta{ color:var(--muted); font-size:13px; margin-top:6px; }
  .news-empty{ color:var(--muted); font-size:15px; padding:60px 12px; text-align:center; }
  .news-summary{ background:#2b313f; border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; margin:4px 0 14px; }
  .news-summary .s-title{ font-size:13px; font-weight:700; color:#9fd4ff; margin-bottom:6px; }
  .ai-usage{ float:right; color:var(--muted); font-size:11px; font-weight:400; }
  .news-summary .s-body{ font-size:14px; line-height:1.6; white-space:pre-line; }
  .news-summary.locked{ text-align:center; color:var(--muted); }
  .news-summary.locked .btn-sub{ margin-top:8px; display:inline-block; }
  /* 기사별 AI 요약 */
  .news-itemsum{ margin-top:7px; padding:8px 10px; background:#272d3a; border-radius:8px;
    font-size:13px; line-height:1.5; color:#cfd6e4; }
  .news-itemsum b{ color:#9fd4ff; font-weight:700; }
  .sent{ display:inline-block; font-size:12px; font-weight:700; padding:2px 9px;
    border-radius:6px; margin-right:8px; vertical-align:middle; }
  .sent-pos{ background:#0a9d4a; color:#fff; }
  .sent-neg{ background:#c40000; color:#fff; }
  .sent-neu{ background:#3a4253; color:#cfd4de; }
</style>
</head>
<body>
  <div id="authbar"></div>

  <div id="top">
    <span id="title">KOSPI200 시가총액 트리맵</span><span id="asof"></span>
    <span id="status"></span>
    <div id="tabs"></div>
  </div>
  <div id="chart"></div>
  <div id="treeBack" onclick="goRoot()" title="전체 보기">←</div>
  <div id="foot">박스 크기 = 시가총액 · 색상 = 등락률 · 업종 클릭 = 확대 · 종목 클릭 = 뉴스 · 상단 'KOSPI200' 클릭 = 뒤로</div>

  <div id="adbar"></div>

  <div id="acctModal" onclick="if(event.target===this)closeAccount()">
    <div class="acct-card" id="acctCard"></div>
  </div>

  <div id="newsPanel">
    <div id="newsHead">
      <div id="newsHeadL">
        <span id="newsTitle"></span>
        <span id="newsSub">최근 24시간 · 최신순 최대 10건 · 호재/악재는 자동 추정(참고용)</span>
      </div>
      <span id="newsClose" onclick="closeNews()">← 뒤로</span>
    </div>
    <div id="newsBody"></div>
  </div>

<script>
const PERIODS = ["실시간","1일","1주","1개월","3개월","1년","YTD"];
let current = "실시간";
let timer = null;
const REFRESH_MS = 15000; // 장중 자동 갱신 주기

function renderTabs(){
  const box = document.getElementById("tabs");
  box.innerHTML = "";
  PERIODS.forEach(p=>{
    const b = document.createElement("div");
    b.className = "tab" + (p===current?" active":"");
    b.textContent = p;
    b.onclick = ()=>{ current=p; renderTabs(); load(); };
    box.appendChild(b);
  });
}

let lastData = null;
function draw(d){
  lastData = d;
  const data = [{
    type:"treemap", branchvalues:"total",
    ids:d.ids, labels:d.labels, parents:d.parents, values:d.values,
    text:d.text, texttemplate:"%{text}", customdata:d.customdata,
    hovertemplate:"<b>%{label}</b><br>시총: %{customdata[0]}<br>수익률: %{customdata[1]}<extra></extra>",
    marker:{ colors:d.colors, colorscale:d.colorscale, cmid:0, cmin:d.cmin, cmax:d.cmax,
             line:{width:1,color:"#1b1f2a"},
             colorbar:{ title:"등락률 %", ticksuffix:"%", tickfont:{color:"#e6e6e6"}, title_font:{color:"#e6e6e6"}, outlinewidth:0 } },
    textfont:{ size:13, color:"#e6e6e6", family:"Pretendard,'Apple SD Gothic Neo',sans-serif" },
    tiling:{ packing:"squarify" }, sort:true,
    pathbar:{ visible:false },          // 얇은 경로바 대신 커스텀 '전체 보기' 버튼 사용
  }];
  const layout = {
    paper_bgcolor:"#1b1f2a", plot_bgcolor:"#1b1f2a",
    margin:{l:8,r:8,t:8,b:8},
    font:{ color:"#e6e6e6", family:"Pretendard,'Apple SD Gothic Neo',sans-serif" },
  };
  Plotly.react("chart", data, layout, {responsive:true, displayModeBar:false})
    .then(()=>{ bindClick(); showBack(false); });   // 탭 전환 시 항상 전체뷰로 시작
}

let _bound = false;
function bindClick(){
  if(_bound) return;
  const gd = document.getElementById("chart");
  gd.on("plotly_treemapclick", function(ev){
    const p = ev.points && ev.points[0];
    if(!p) return;
    // Plotly 버전에 따라 p.id 가 없을 수 있어 pointNumber 로 ids 를 역참조
    let id = p.id;
    if(!id && lastData && typeof p.pointNumber === "number") id = lastData.ids[p.pointNumber];
    if(!id) return false;
    if(id.indexOf("stk::") === 0){             // 종목 → 뉴스
      const label = p.label || (lastData ? lastData.labels[p.pointNumber] : id.slice(5));
      openNews(id.slice(5), label);
      return false;
    }
    if(id.indexOf("sec::") === 0){             // 업종 → 네이티브 확대 유지 + 화살표만 표시
      showBack(true);
      return;                                  // return false 아님 → 기본 확대 동작 유지
    }
    return false;
  });
  _bound = true;
}

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function fmtTime(iso){ try{ return new Date(iso).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return iso; } }

let curNews = null, curTicker = "";
async function openNews(ticker, name){
  curTicker = ticker; curNews = null;
  const panel = document.getElementById("newsPanel");
  panel.classList.add("open");
  document.getElementById("newsTitle").textContent = name || ticker;
  setBody('<div class="news-empty">불러오는 중…</div>');
  try{
    const r = await fetch(`/api/news?ticker=${encodeURIComponent(ticker)}`);
    curNews = await r.json();
    renderNews(curNews);
  }catch(e){
    setBody('<div class="news-empty">불러오기 실패</div>');
  }
}

// '요약 보기' 클릭 시에만 Gemini 호출 (토큰 절약)
async function loadSummary(){
  if(!curNews) return;
  const btn = document.getElementById("sumBtn");
  if(btn){ btn.textContent = "요약 생성 중…"; btn.style.pointerEvents = "none"; }
  try{
    const s = await (await fetch(`/api/summary?ticker=${encodeURIComponent(curTicker)}`, {cache:"no-store"})).json();
    if(s.error){ alert("지금은 AI 요약을 생성할 수 없어요. (요청 한도 초과 등)\n잠시 후 다시 시도해 주세요. 차감되지 않았어요."); if(btn){btn.textContent="🤖 AI 종합 요약 보기"; btn.style.pointerEvents="";} return; }
    if(s.limited){ curNews.summary_limited = true; curNews.ai_used = s.ai_used; curNews.ai_limit = s.ai_limit; renderNews(curNews); return; }
    curNews.summary = s.summary; curNews.sentiment = s.sentiment; curNews.score = s.score;
    curNews.ai_used = s.ai_used; curNews.ai_limit = s.ai_limit;
    (curNews.items||[]).forEach((it,i)=>{ it.summary = (s.summaries||[])[i]; it.label = (s.labels||[])[i]; });
    renderNews(curNews);
  }catch(e){
    alert("요약 생성 중 오류가 발생했어요.");
    if(btn){ btn.textContent="🤖 AI 종합 요약 보기"; btn.style.pointerEvents=""; }
  }
}

function setBody(inner){
  document.getElementById("newsBody").innerHTML = '<div id="newsInner">' + inner + '</div>';
}

function renderNews(d){
  if(d.error === "no_api_key"){
    setBody('<div class="news-empty">네이버 API 키가 설정되지 않았어요.<br>.env 에 NAVER_CLIENT_ID/SECRET 추가하세요.</div>');
    return;
  }
  const items = d.items || [];
  if(!items.length){
    setBody('<div class="news-empty">최근 24시간 내 뉴스가 없어요.</div>');
    return;
  }
  let head = "";
  if(d.summary){
    const gauge = d.sentiment
      ? `<span class="sent ${sentClass(d.sentiment)}">종합 ${d.sentiment} ${d.score}%</span>`
      : "";
    const usage = (d.ai_used!=null && d.ai_limit!=null)
      ? `<span class="ai-usage">오늘 ${d.ai_used}/${d.ai_limit}</span>` : "";
    head = `<div class="news-summary"><div class="s-title">🤖 AI 종합 요약 ${gauge}${usage}</div>`
         + `<div class="s-body">${escapeHtml(d.summary)}</div></div>`;
  } else if(d.summary_limited){
    head = `<div class="news-summary locked">⏳ 오늘 AI 요약 한도(${d.ai_limit||10}회)를 모두 사용했어요.`
         + `<br>내일 다시 이용할 수 있어요.</div>`;
  } else if(d.summary_available){
    const note = d.summary_cached
      ? "오늘 이미 열람 · 무료"
      : `클릭 시 1회 사용 · 오늘 ${d.ai_used}/${d.ai_limit}`;
    head = `<div class="news-summary"><span class="btn btn-sub" id="sumBtn" onclick="loadSummary()">🤖 AI 종합 요약 보기</span>`
         + ` <span class="ai-usage">${note}</span></div>`;
  } else if(d.summary_locked){
    head = `<div class="news-summary locked">🔒 AI 요약은 구독자 전용이에요.`
         + `<br><span class="btn btn-sub" onclick="startSubscribe()">구독하고 요약 보기</span></div>`;
  }
  setBody(head + items.map(it=>`
    <a class="news-item" href="${it.link}" target="_blank" rel="noopener">
      <div class="news-headline">${sentBadge(it.label)}${escapeHtml(it.title)}</div>
      ${it.summary ? `<div class="news-itemsum"><b>AI 요약</b> ${escapeHtml(it.summary)}</div>` : ""}
      <div class="news-meta">${escapeHtml(it.source||"")} · ${fmtTime(it.pub)}</div>
    </a>`).join(""));
}

function sentClass(label){
  return label==="호재" ? "sent-pos" : (label==="악재" ? "sent-neg" : "sent-neu");
}
function sentBadge(label){
  if(!label) return "";
  return `<span class="sent ${sentClass(label)}">${label}</span>`;
}

function closeNews(){ document.getElementById("newsPanel").classList.remove("open"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeNews(); });

function showBack(on){
  const b = document.getElementById("treeBack");
  if(b) b.classList.toggle("show", !!on);
}
function togglePathbar(){ /* 더 이상 경로바 의존 안 함 (호환용 빈 함수) */ }

// 트리맵 전체(루트)로 되돌리기
function goRoot(){
  const gd = document.getElementById("chart");
  if(window.Plotly) Plotly.restyle(gd, {level: ""});
  showBack(false);
}

async function load(){
  try{
    const r = await fetch(`/api/heatmap?period=${encodeURIComponent(current)}`);
    const d = await r.json();
    document.getElementById("asof").textContent = "· 기준 " + (d.as_of||"");
    const st = document.getElementById("status");
    if(current==="실시간"){
      st.textContent = d.market_open ? "● 실시간(장중, 자동 갱신)" : "○ 장 마감 — 1일과 동일";
      st.style.color = d.market_open ? "#23c265" : "#8a90a0";
    } else { st.textContent = ""; }
    draw(d);
    scheduleRefresh(d.market_open);
  }catch(e){
    document.getElementById("status").textContent = "데이터 로드 실패";
  }
}

function scheduleRefresh(marketOpen){
  if(timer) clearTimeout(timer);
  if(current==="실시간" && marketOpen){
    timer = setTimeout(load, REFRESH_MS);
  }
}

// ── V3: 로그인/구독 상태 + 광고 게이팅 ──
let meData = null;
async function loadMe(){
  let d = {logged_in:false, kakao_enabled:false};
  try{ d = await (await fetch("/api/me", {cache:"no-store"})).json(); }catch(e){}
  meData = d;
  const bar = document.getElementById("authbar");
  if(d.logged_in){
    const sub = d.is_subscribed
      ? '<span class="badge-sub">구독중</span>'
      : '<span class="btn btn-sub" onclick="startSubscribe()">구독하기 ₩4,900/월</span>';
    bar.innerHTML = `${sub}<span class="btn" onclick="openAccount()">${escapeHtml(d.nickname||"회원")} ⚙</span>`
      + `<a class="btn" href="/auth/logout">로그아웃</a>`;
  } else {
    bar.innerHTML = d.kakao_enabled
      ? `<a class="btn btn-kakao" href="/auth/login">카카오 로그인</a>`
      : `<span style="color:var(--muted)">로그인 비활성</span>`;
  }
  // 구독자면 광고 영역 자체 제거, 그 외엔 실제 광고가 있을 때만 노출
  if(d.logged_in && d.is_subscribed){ setAd(false); }
  else { loadAd(); }
}

async function loadAd(){
  let a = {enabled:false};
  try{ a = await (await fetch("/api/ad", {cache:"no-store"})).json(); }catch(e){}
  const bar = document.getElementById("adbar");
  if(a.enabled){
    bar.innerHTML = '<div class="ad-slot"></div>'
      + `<div class="ad-disc">${escapeHtml(a.disclosure||"")}</div>`;
    injectAd(bar.querySelector(".ad-slot"), a.html);
    setAd(true);
  } else {
    bar.innerHTML = "";          // 실제 광고 없으면 빈 회색칸도 안 띄움
    setAd(false);
  }
}

// 광고 스니펫을 '실제 페이지 컨텍스트'에서 실행 (쿠팡 위젯이 도메인/리퍼러를 인식해야 렌더됨)
// innerHTML 로는 <script> 가 실행 안 되므로, script 엘리먼트를 새로 만들어 순서대로 주입.
function injectAd(slot, html){
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const scripts = Array.prototype.slice.call(tmp.querySelectorAll("script"));
  scripts.forEach(s=>s.parentNode && s.parentNode.removeChild(s));
  slot.appendChild(tmp);                       // 스크립트 외 마크업(있으면)
  (function next(i){
    if(i >= scripts.length) return;
    const old = scripts[i];
    const s = document.createElement("script");
    for(const at of old.attributes) s.setAttribute(at.name, at.value);
    if(old.src){                               // 외부 g.js: 로드 끝난 뒤 다음 실행
      s.onload = ()=>next(i+1);
      s.onerror = ()=>next(i+1);
      slot.appendChild(s);
    } else {                                   // 인라인: 즉시 실행 후 다음
      s.textContent = old.textContent;
      slot.appendChild(s);
      next(i+1);
    }
  })(0);
}

// 광고 노출 토글 + 차트 높이 재계산(가림 방지)
function setAd(on){
  document.getElementById("adbar").classList.toggle("show", on);
  document.body.classList.toggle("ad-on", on);
  const gd = document.getElementById("chart");
  if(gd && window.Plotly && window.Plotly.Plots) Plotly.Plots.resize(gd);
}

// ── 내 구독 관리 모달 ──
function daysLeft(iso){
  const end = new Date(iso + "T23:59:59");
  return Math.max(0, Math.ceil((end - new Date()) / 86400000));
}
async function openAccount(){
  try{ meData = await (await fetch("/api/me", {cache:"no-store"})).json(); }catch(e){}
  const d = meData || {};
  let rows = `<div class="acct-row"><span class="k">닉네임</span><span>${escapeHtml(d.nickname||"")}</span></div>`;
  rows += `<div class="acct-row"><span class="k">상태</span><span>${d.is_subscribed ? '<span class="badge-sub">구독중</span>' : '미구독'}</span></div>`;
  if(d.is_subscribed && d.subscribed_until){
    rows += `<div class="acct-row"><span class="k">만료일</span><span>${d.subscribed_until} (D-${daysLeft(d.subscribed_until)})</span></div>`;
  }
  if(d.is_admin) rows += `<div class="acct-row"><span class="k">권한</span><span>관리자</span></div>`;
  const payLabel = d.is_subscribed ? "구독 연장하기" : "구독하기 ₩4,900/월";
  document.getElementById("acctCard").innerHTML =
    `<div class="acct-title">내 구독</div>${rows}`
    + `<div class="acct-actions">`
    + `<span class="btn btn-sub" onclick="startSubscribe()">${payLabel}</span>`
    + `<a class="btn" href="/auth/logout">로그아웃</a>`
    + `<span class="btn" onclick="closeAccount()">닫기</span></div>`
    + `<div class="acct-note">단건 결제 상품이라 자동 갱신되지 않아요. 만료 전에 연장 결제하면 남은 기간에 30일이 더해집니다.</div>`;
  document.getElementById("acctModal").classList.add("show");
}
function closeAccount(){ document.getElementById("acctModal").classList.remove("show"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeAccount(); });

// ── 구독 결제 (Toss Payments) ──
function loadScript(src){
  return new Promise((res, rej)=>{
    if(document.querySelector(`script[src="${src}"]`)) return res();
    const s=document.createElement("script");
    s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

async function startSubscribe(){
  try{
    const cfg = await (await fetch("/api/billing/config",{cache:"no-store"})).json();
    if(!cfg.enabled){ alert("결제가 아직 준비 중이에요. (관리자에게 문의)"); return; }
    const order = await (await fetch("/api/billing/checkout",{method:"POST"})).json();
    if(order.error){ alert("로그인이 필요해요."); return; }
    await loadScript("https://js.tosspayments.com/v1/payment");
    const toss = TossPayments(order.clientKey);
    toss.requestPayment("카드", {
      amount: order.amount, orderId: order.orderId, orderName: order.orderName,
      customerName: order.customerName,
      successUrl: order.successUrl, failUrl: order.failUrl,
    });
  }catch(e){ alert("결제 시작 중 오류가 발생했어요."); }
}

// 결제 결과 토스트
(function(){
  const p = new URLSearchParams(location.search).get("sub");
  if(p === "success") setTimeout(()=>alert("구독이 완료됐어요! 광고가 사라집니다."), 300);
  else if(p === "fail") setTimeout(()=>alert("결제가 취소되었거나 실패했어요."), 300);
  if(p){ history.replaceState({}, "", location.pathname); }
})();

renderTabs();
load();
loadMe();
window.addEventListener("resize", togglePathbar);

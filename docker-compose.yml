# KOSPI200 히트맵 - 통합 구성 (Phase 1~3)
#   db  : MySQL 8 (영구 볼륨, schema.sql 자동 적용)
#   web : FastAPI 트리맵 서버 (port 8000)
#
# 최초 실행:
#   1) cp .env.example .env  (값 채우기)
#   2) docker compose up -d db
#   3) 데이터 적재(둘 중 하나):
#        - 기존 CSV 이관:  docker compose run --rm web python scripts/import_csv_to_db.py --csv /seed/kospi200_daily_XXXX.csv
#        - 새로 수집:      docker compose run --rm web python -m app.collect
#   4) docker compose up -d web
#   5) http://<맥미니IP>:8000 접속
#
services:
  db:
    image: mysql:8.4
    container_name: kospi200-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    container_name: kospi200-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 컨테이너 내부에서는 DB 호스트가 'db'
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      KIS_APPKEY: ${KIS_APPKEY}
      KIS_APPSECRET: ${KIS_APPSECRET}
      KRX_ID: ${KRX_ID}
      KRX_PW: ${KRX_PW}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      SENTIMENT_PROVIDER: ${SENTIMENT_PROVIDER:-keyword}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-change-me}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY:-}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      SUBSCRIPTION_PRICE: ${SUBSCRIPTION_PRICE:-4900}
      SUBSCRIPTION_DAYS: ${SUBSCRIPTION_DAYS:-30}
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    volumes:
      - token_cache:/srv/data     # kis_token.json 만 유지 (/srv 전체를 덮지 않도록!)
      - ./app:/srv/app            # 코드 라이브 반영(html/py 수정 시 재빌드 불필요)
      - ./seed:/seed:ro           # 초기 적재용 CSV 마운트(선택)

  # 평일 18:00 자동 업데이트 + 매일 18:30 백업 (Phase 5)
  scheduler:
    build: .
    container_name: kospi200-scheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      KIS_APPKEY: ${KIS_APPKEY}
      KIS_APPSECRET: ${KIS_APPSECRET}
      KRX_ID: ${KRX_ID}
      KRX_PW: ${KRX_PW}
      BACKUP_DIR: /backups
      TZ: Asia/Seoul
    command: ["python", "-m", "app.scheduler"]
    volumes:
      - ./backups:/backups        # 백업 파일(csv.gz) 호스트에 보관
      - token_cache:/srv/data
      - ./app:/srv/app

volumes:
  mysql_data:
  token_cache:
